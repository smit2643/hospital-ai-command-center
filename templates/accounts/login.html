{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center reveal">
  <div class="col-lg-5">
    <div class="glass p-4 form-shell">
      <h1 class="page-title h3 mb-2">Secure Login</h1>
      <p class="page-subtitle mb-3">Access doctor, patient, or admin workspace.</p>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100" type="submit">Enter Platform</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
