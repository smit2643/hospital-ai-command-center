{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center reveal">
  <div class="col-lg-8">
    <div class="glass p-4 form-shell">
      <div class="page-head mb-3">
        <div>
          <h1 class="page-title h3">Doctor Registration</h1>
          <p class="page-subtitle">Create your account. Admin approval is required before activation.</p>
        </div>
      </div>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Submit Registration</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
