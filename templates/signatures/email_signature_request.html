<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(13,38,76,.12);">
            <tr>
              <td style="background:linear-gradient(120deg,#0d6efd,#20c997);padding:24px 28px;color:#fff;">
                <h1 style="margin:0;font-size:24px;">Signature Request</h1>
                <p style="margin:8px 0 0 0;font-size:14px;opacity:.95;">Secure medical document signing</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px;color:#1e2a3a;">
                <p style="margin:0 0 10px 0;font-size:15px;">A document is ready for your signature.</p>
                <p style="margin:0 0 8px 0;"><strong>Patient:</strong> {{ patient_name }}</p>
                <p style="margin:0 0 8px 0;"><strong>Document ID:</strong> #{{ document_id }}</p>
                <p style="margin:0 0 18px 0;"><strong>Expires at:</strong> {{ expires_at }}</p>
                <a href="{{ sign_url }}" style="display:inline-block;padding:12px 22px;border-radius:10px;background:#0d6efd;color:#fff;text-decoration:none;font-weight:700;">Click Here To Sign The Document</a>
                <p style="margin:16px 0 0 0;font-size:12px;color:#556274;">If button does not work, copy this link:<br /><a href="{{ sign_url }}" style="color:#0d6efd;word-break:break-all;">{{ sign_url }}</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
