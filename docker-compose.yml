services:
  db:
    image: postgres:16
    container_name: hospital_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospital_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hospital_ai_redis
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: hospital_ai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  web:
    build: .
    container_name: hospital_ai_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hospital_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      SITE_BASE_URL: http://localhost:8000
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db
      - redis
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build: .
    container_name: hospital_ai_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hospital_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db
      - redis
      - ollama
    volumes:
      - .:/app
    command: celery -A hospital_ai worker -l info

  beat:
    build: .
    container_name: hospital_ai_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hospital_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db
      - redis
      - ollama
    volumes:
      - .:/app
    command: celery -A hospital_ai beat -l info

volumes:
  postgres_data:
  ollama_data:
